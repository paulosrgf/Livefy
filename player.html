<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livefy — Now Playing</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="/theme.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a
        href="index.html"
        class="button icon-button"
        style="text-decoration: none"
      >
        <i class="bi bi-arrow-left"></i> Livefy
      </a>
      <button
        id="theme-toggle"
        class="button icon-button"
        aria-label="Toggle light and dark theme"
      >
        <i class="bi bi-moon-stars-fill"></i>
      </button>
    </header>

    <div class="music-container">
      <h4 id="playlist-title">Playlist Essentials</h4>
      <img id="cover" alt="Disc Cover." />
      <audio id="audio"></audio>
      <div id="below-cover">
        <div id="song-info">
          <div id="song-name"></div>
          <div id="band-name" class="light-color"></div>
        </div>
        <button id="like" class="button light-color">
          <i class="bi bi-heart"></i>
        </button>
      </div>
      <div id="progress-container">
        <div id="progress-bar">
          <div id="current-progress"></div>
        </div>
        <div id="time-box">
          <div id="song-time">00:00</div>
          <div id="total-time">00:00</div>
        </div>
      </div>
      <div id="button-container">
        <button id="shuffle" class="button">
          <i class="bi bi-shuffle"></i>
        </button>
        <button id="previous" class="button button-navigate">
          <i class="bi bi-skip-start-fill"></i>
        </button>
        <button id="play" class="button button-biggest">
          <i class="bi bi-play-circle-fill"></i>
        </button>
        <button id="next" class="button button-navigate">
          <i class="bi bi-skip-end-fill"></i>
        </button>
        <button id="repeat" class="button"><i class="bi bi-repeat"></i></button>
      </div>
    </div>

    <script src="/data.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
