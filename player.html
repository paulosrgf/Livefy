<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livefy — Now Playing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
</head>
<body>
    <header class="topbar">
        <a href="index.html" class="button icon-button logo-link">
            <i class="bi bi-arrow-left"></i> Livefy
        </a>
        <button id="theme-toggle" type="button" class="button icon-button" aria-label="Toggle light and dark theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </header>

    <main class="music-container">
        <h1 id="playlist-title">Playlist Essentials</h1>

        <figure class="cover-figure">
            <img id="cover" class="cover-art" alt="Album cover of the current song">
        </figure>
        <audio id="audio"></audio>

        <section class="song-meta-row" aria-label="Now playing">
            <div>
                <h2 id="song-name" class="song-title"></h2>
                <p id="band-name" class="song-artist light-color"></p>
            </div>
            <button id="like" type="button" class="button light-color" aria-label="Like this song">
                <i class="bi bi-heart"></i>
            </button>
        </section>

        <section class="progress-track" id="progress-container" aria-label="Seek">
            <div class="progress-bar">
                <div id="current-progress" class="progress-fill"></div>
            </div>
            <div class="time-box">
                <time id="song-time">00:00</time>
                <time id="total-time">00:00</time>
            </div>
        </section>

        <section class="playback-controls" role="group" aria-label="Playback controls">
            <button id="shuffle" type="button" class="button" aria-label="Shuffle"><i class="bi bi-shuffle"></i></button>
            <button id="previous" type="button" class="button button-navigate" aria-label="Previous song"><i class="bi bi-skip-start-fill"></i></button>
            <button id="play" type="button" class="button button-biggest" aria-label="Play or pause"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next" type="button" class="button button-navigate" aria-label="Next song"><i class="bi bi-skip-end-fill"></i></button>
            <button id="repeat" type="button" class="button" aria-label="Repeat"><i class="bi bi-repeat"></i></button>
        </section>
    </main>

    <script src="/data.js"></script>
    <script src="/script.js"></script>
</body>
</html>
